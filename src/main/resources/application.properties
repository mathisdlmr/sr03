spring.datasource.url=jdbc:sqlite:database.sqlite
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.datasource.hikari.maximum-pool-size=1

# ----- Configuration JWT -----
# Generated using `openssl rand -base64 32`
jwt.secret=4+nhMdvErJ1L7XzUKxzdq787KUgRg93ByzrRu6rZtNE=
# Access token expiration: 3600000 ms = 1 hour
jwt.expiration=3600000
# Refresh token expiration: 86400000 ms = 24 hours
jwt.refresh-expiration=86400000

# ----- Configuration email -----
mail.mode=dev
mail.from=nepasrepondre@utc.fr
mail.smtp.host=smtp.gmail.com
mail.smtp.port=587
mail.smtp.user=
mail.smtp.password=

# ----- Configuration WebSocket -----
# On set la taille max des messages à 5Mo pour pouvoir envoyer des images
spring.websocket.max-text-message-size=5242880
spring.websocket.max-binary-message-size=5242880

# ----- Configuration Upload -----
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB
