<!DOCTYPE html>
<html lang="fr" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mot de passe oublié - SR03</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.metroui.org.ua/current/metro.css">
    <link rel="stylesheet" href="https://cdn.metroui.org.ua/current/icons.css"/>
    <link rel="stylesheet" th:href="@{/stylesheets/styles.css}">
    <script src="https://cdn.metroui.org.ua/current/metro.js" defer></script>
</head>
<body>
    <main>
        <div class="container mt-20">
            <div class="row">
                <div class="cell-md-6 offset-md-3">
                    <div class="border border-size-1 border-radius-10 bd-blue p-8">
                        <div class="text-center mb-6">
                            <h2 class="text-bold mt-2">Mot de passe oublié</h2>
                            <p class="text-muted">Entrez l'adresse email associée à votre compte pour recevoir un lien de réinitialisation.</p>
                        </div>
                        <div th:if="${error}" class="alert border-radius-2 alert-warning mb-4">
                            <span class="mif-warning mx-2"></span>
                            <span th:text="${error}">Erreur</span>
                        </div>
                        <div th:if="${success}" class="alert alert-success border-radius-2 mb-4">
                            <span class="mif-mail mx-2"></span>
                            <span th:text="${success}">Succès</span>
                        </div>

                        <form th:action="@{/askresetpwd}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <div class="form-group">
                                <label class="label-for-input">Adresse e-mail</label>
                                <input type="email" name="mail" data-role="input" placeholder="john.doe@mail.fr" data-prepend="&lt;span class='mif-person'&gt;" required>
                            </div>
                            <div class="form-group mt-6">
                                <button type="submit" class="button info bg-blue fg-white text-bold w-100">
                                    Envoyer le lien de réinitialisation
                                </button>
                            </div>
                        </form>
                        <div class="mt-4 text-center">
                            <a th:href="@{/login}">Retour à la connexion</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
