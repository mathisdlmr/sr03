<!DOCTYPE html>
<html lang="fr" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Réinitialiser le mot de passe - SR03</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.metroui.org.ua/current/metro.css">
    <link rel="stylesheet" href="https://cdn.metroui.org.ua/current/icons.css"/>
    <link rel="stylesheet" th:href="@{/stylesheets/styles.css}">
    <script src="https://cdn.metroui.org.ua/current/metro.js" defer></script>
</head>
<body>
    <main>
        <div class="container mt-20">
            <div class="row">
                <div class="cell-md-6 offset-md-3">
                    <div class="border border-size-1 border-radius-10 bd-blue p-8">
                        <div class="text-center mb-6">
                            <h2 class="text-bold mt-2">Nouveau mot de passe</h2>
                            <p class="text-muted">Choisissez un nouveau mot de passe pour votre compte.</p>
                        </div>
                        <div th:if="${error}" class="alert alert-warning border-radius-2 mb-4">
                            <span class="mif-warning mx-2"></span>
                            <span th:text="${error}">Erreur</span>
                        </div>

                        <form th:action="@{/resetpwd}" method="post" onsubmit="return validatePwd()">
                            <input type="hidden" name="token" th:value="${token}">
                            <div class="form-group">
                                <label class="label-for-input">Adresse e-mail</label>
                                <input type="email" th:value="${email}" disabled class="bg-light">
                            </div>
                            <div class="form-group mt-4">
                                <label class="label-for-input">Nouveau mot de passe <span class="fg-red">*</span></label>
                                <input type="password" name="password" id="pwd" data-role="input"
                                       placeholder="*********" data-prepend="<span class='mif-lock'></span>"
                                       data-reveal-button-icon="<span class='mif-eye mif-2x'></span>" required minlength="8">
                                <small class="text-muted">Au moins 8 caractères</small>
                            </div>
                            <div class="form-group mt-4">
                                <label class="label-for-input">Confirmer le mot de passe <span class="fg-red">*</span></label>
                                <input type="password" id="pwd2" data-role="input"
                                       placeholder="*********" data-prepend="<span class='mif-lock'></span>"
                                       data-reveal-button-icon="<span class='mif-eye mif-2x'></span>" required minlength="8">
                            </div>
                            <div id="pwd-error" class="fg-red mt-2" style="display:none;">
                                Les mots de passe ne correspondent pas.
                            </div>
                            <div class="form-group mt-6">
                                <button type="submit" class="button info bg-blue fg-white text-bold w-100">
                                    Réinitialiser le mot de passe
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script>
        function validatePwd() {
            const pwd = document.getElementById('pwd').value;
            const pwd2 = document.getElementById('pwd2').value;
            if (pwd !== pwd2) {
                document.getElementById('pwd-error').style.display = 'block';
                return false;
            }
            return true;
        }
    </script>
</body>
</html>
