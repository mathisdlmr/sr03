<!DOCTYPE html>
<html lang="fr" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Réinitialiser le mot de passe — SR03</title>
    <link rel="stylesheet" href="https://cdn.metroui.org.ua/current/metro.css">
    <link rel="stylesheet" th:href="@{/stylesheets/styles.css}">
    <script src="https://cdn.metroui.org.ua/current/metro.js" defer></script>
</head>
<body>
    <main>
        <div class="container mt-10">
            <div class="row">
                <div class="cell-md-4 offset-md-4">
                    <div class="text-center mb-6">
                        <h2 class="text-bold mt-2">Nouveau mot de passe</h2>
                        <p class="text-muted">Choisissez un nouveau mot de passe pour votre compte.</p>
                    </div>
                    <div th:if="${error}" class="alert alert-warning mb-4">
                        <span class="mif-warning mr-2"></span>
                        <span th:text="${error}">Erreur</span>
                    </div>
                    <div class="border bd-blue p-6">
                        <form th:action="@{/resetpwd}" method="post" onsubmit="return validatePwd()">
                            <input type="hidden" name="token" th:value="${token}">
                            <div class="form-group">
                                <label>Adresse e-mail</label>
                                <input type="email" th:value="${email}" disabled class="bg-light">
                            </div>
                            <div class="form-group mt-4">
                                <label>Nouveau mot de passe <span class="fg-red">*</span></label>
                                <input type="password" name="password" id="pwd" data-role="input"
                                       placeholder="*********" required minlength="8">
                                <small class="text-muted">Au moins 8 caractères</small>
                            </div>
                            <div class="form-group mt-4">
                                <label>Confirmer le mot de passe <span class="fg-red">*</span></label>
                                <input type="password" id="pwd2" data-role="input"
                                       placeholder="*********" required minlength="8">
                            </div>
                            <div id="pwd-error" class="fg-red mt-2" style="display:none;">
                                Les mots de passe ne correspondent pas.
                            </div>
                            <div class="form-group mt-6">
                                <button type="submit" class="button bg-blue fg-white text-bold w-100">
                                    Réinitialiser le mot de passe
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script>
        function validatePwd() {
            const pwd = document.getElementById('pwd').value;
            const pwd2 = document.getElementById('pwd2').value;
            if (pwd !== pwd2) {
                document.getElementById('pwd-error').style.display = 'block';
                return false;
            }
            return true;
        }
    </script>
</body>
</html>
