<!DOCTYPE html>
<html lang="fr" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un utilisateur - SR03</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.metroui.org.ua/current/metro.css">
    <link rel="stylesheet" href="https://cdn.metroui.org.ua/current/icons.css"/>
    <link rel="stylesheet" th:href="@{/stylesheets/styles.css}">
    <script src="https://cdn.metroui.org.ua/current/metro.js" defer></script>
</head>
<body>
    <nav data-role="appbar" data-expand-point="md" class="border border-size-1 bd-gray shadow-normal">
        <ul class="app-bar-menu">
            <li><a th:href="@{/listuser}"><span class="mif-home mr-1"></span> Accueil</a></li>
            <li><a th:href="@{/create}"><span class="mif-add-person mr-1"></span> Nouveau utilisateur</a></li>
            <li><a th:href="@{/listinactiveuser}"><span class="mif-uninstall mr-1"></span> Utilisateurs désactivés</a></li>
        </ul>

        <div class="app-bar-item-static mx-auto mt-2">
            <h3 th:text="${sessionUser.firstname + ' ' + sessionUser.lastname}"></h3>
        </div>

        <div class="app-bar-item-static ml-auto">
            <a th:href="@{/logout}">
                <button class="small ml-1 alert">
                    <span class="mif-switch mr-1"></span> Déconnexion
                </button>
            </a>
        </div>
    </nav>

    <main class="container mt-6">
        <div class="row">
            <div class="text-center cell-md-6 offset-md-3">
                <h2>Créer un nouvel utilisateur</h2>
                <div th:if="${error}" class="alert alert-warning border-radius-2 mb-4">
                    <span th:text="${error}"></span>
                </div>
                <div th:if="${success}" class="success border-radius-2 mb-4">
                    <span th:text="${success}"></span>
                </div>
                <div class="border border-size-1 border-radius-10 bd-blue p-8">
                    <form th:action="@{/create}" method="post" onsubmit="return validateForm()">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <div class="form-group">
                            <label class="label-for-input">Prénom <span class="fg-red">*</span></label>
                            <input type="text" name="firstname" data-role="input" placeholder="Jean" required minlength="2" maxlength="50" pattern="[A-Za-zÀ-ÿ\-\s]+" title="Lettres, espaces et tirets uniquement">
                        </div>
                        <div class="form-group mt-4">
                            <label class="label-for-input">Nom <span class="fg-red">*</span></label>
                            <input type="text" name="lastname" data-role="input" placeholder="Dupont" required minlength="2" maxlength="50" pattern="[A-Za-zÀ-ÿ\-\s]+" title="Lettres, espaces et tirets uniquement">
                        </div>
                        <div class="form-group mt-4">
                            <label class="label-for-input">Adresse e-mail <span class="fg-red">*</span></label>
                            <input type="email" name="mail" data-role="input" placeholder="jean.dupont@mail.fr" data-prepend="&lt;span class='mif-person'&gt;" required maxlength="100">
                        </div>
                        <div class="form-group mt-4 flex">
                            <label class="label-for-input mr-2">Compte administrateur ?</label>
                            <input type="checkbox" data-role="checkbox" name="admin" value="true">
                        </div>
                        <div class="text-center mt-4">
                            <p class="text-muted">
                                Un mot de passe temporaire sera généré automatiquement et envoyé par email.
                            </p>
                        </div>
                        <div class="form-group mt-4">
                            <button type="submit" class="button info bg-blue fg-white text-bold w-100">
                                Créer l'utilisateur
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
