<!DOCTYPE html>
<html lang="fr" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Créer un utilisateur — SR03</title>
    <link rel="stylesheet" href="https://cdn.metroui.org.ua/current/metro.css">
    <link rel="stylesheet" th:href="@{/stylesheets/styles.css}">
    <script src="https://cdn.metroui.org.ua/current/metro.js" defer></script>
</head>
<body>
    <nav data-role="appbar" data-expand-point="md" class="border-bottom bd-default">
        <ul class="app-bar-menu">
            <li><a th:href="@{/listuser}">Accueil</a></li>
            <li><a th:href="@{/create}">Nouveau utilisateur</a></li>
            <li><a th:href="@{/listinactiveuser}">Utilisateurs désactivés</a></li>
        </ul>

        <div class="app-bar-item-static mx-auto">
            <p th:text="${session.user.firstname + ' ' + session.user.lastname}"></p>
        </div>

        <div class="app-bar-item-static ml-auto">
            <a th:href="@{/logout}">
                <button class="small ml-1 alert">
                    Déconnexion
                </button>
            </a>
        </div>
    </nav>

    <main class="container mt-6">
        <div class="row">
            <div class="cell-md-6 offset-md-3">
                <h2>Créer un nouvel utilisateur</h2>
                <div th:if="${error}" class="alert alert-warning mb-4">
                    <span th:text="${error}"></span>
                </div>
                <div th:if="${success}" class="alert alert-success mb-4">
                    <span th:text="${success}"></span>
                </div>
                <div class="border bd-blue p-6">
                    <form th:action="@{/create}" method="post" onsubmit="return validateForm()">
                        <div class="form-group">
                            <label>Prénom <span class="fg-red">*</span></label>
                            <input type="text" name="firstname" data-role="input" placeholder="Jean" required minlength="2" maxlength="50" pattern="[A-Za-zÀ-ÿ\-\s]+" title="Lettres, espaces et tirets uniquement">
                        </div>
                        <div class="form-group mt-4">
                            <label>Nom <span class="fg-red">*</span></label>
                            <input type="text" name="lastname" data-role="input" placeholder="Dupont" required minlength="2" maxlength="50" pattern="[A-Za-zÀ-ÿ\-\s]+" title="Lettres, espaces et tirets uniquement">
                        </div>
                        <div class="form-group mt-4">
                            <label>Adresse e-mail <span class="fg-red">*</span></label>
                            <input type="email" name="mail" data-role="input" placeholder="jean.dupont@mail.fr" required maxlength="100">
                        </div>
                        <div class="form-group mt-4">
                            <label> Compte administrateur</label>
                            <input type="checkbox" name="admin" value="true">
                        </div>
                        <p class="text-muted mt-4">
                            Un mot de passe temporaire sera généré automatiquement et envoyé par email.
                        </p>
                        <div class="form-group mt-4">
                            <button type="submit" class="button bg-blue fg-white text-bold w-100">
                                Créer l'utilisateur
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
