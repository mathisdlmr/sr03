<!DOCTYPE html>
<html lang="fr" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Panel Admin — SR03</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.metroui.org.ua/current/metro.css">
    <link rel="stylesheet" href="https://cdn.metroui.org.ua/current/icons.css"/>
    <link rel="stylesheet" th:href="@{/stylesheets/styles.css}">
    <script src="https://cdn.metroui.org.ua/current/metro.js" defer></script>
</head>
<body>
    <nav data-role="appbar" data-expand-point="md" class="border border-size-1 bd-gray shadow-normal">
        <ul class="app-bar-menu">
            <li><a th:classappend="${!inactive ? ' active' : ''}" th:href="@{/listuser}">Accueil</a></li>
            <li><a th:href="@{/create}">Nouveau utilisateur</a></li>
            <li><a th:classappend="${inactive ? ' active' : ''}" th:href="@{/listinactiveuser}">Utilisateurs désactivés</a></li>
        </ul>

        <div class="app-bar-item-static mx-auto">
            <p th:text="${session.user.firstname + ' ' + session.user.lastname}"></p>
        </div>

        <div class="app-bar-item-static ml-auto">
            <a th:href="@{/logout}">
                <button class="small ml-1 alert">
                    Déconnexion
                </button>
            </a>
        </div>
    </nav>

    <main class="container mt-6">
        <h2 th:text="${inactive ? 'Utilisateurs désactivés' : 'Liste des utilisateurs'}">Liste des utilisateurs</h2>
        <form th:action="${listUrl}" method="get">
            <input type="text" name="search" th:value="${search}" placeholder="Rechercher par nom, prénom ou email...">
            <button type="submit" class="button bg-blue fg-white">Rechercher</button>
            <a th:href="${listUrl}" class="button">Réinitialiser</a>
        </form>
        <table class="table striped border" th:if="${not #lists.isEmpty(users)}">
            <thead>
                <tr>
                    <th>Nom</th>
                    <th>Prénom</th>
                    <th>Email</th>
                    <th>Rôle</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="u : ${users}">
                    <td th:text="${u.lastname}"></td>
                    <td th:text="${u.firstname}"></td>
                    <td th:text="${u.mail}"></td>
                    <td>
                        <span th:if="${u.admin}">Admin</span>
                        <span th:unless="${u.admin}">Utilisateur</span>
                    </td>
                    <td>
                        <a th:href="@{/edituser/{id}(id=${u.id})}" class="button mini bg-dark fg-white">Éditer</a>
                        <form th:action="@{/toggleuser/{id}(id=${u.id})}" method="post">
                            <input type="hidden" name="returnUrl" th:value="${listUrl}">
                            <button type="submit" th:text="${u.active ? 'Désactiver' : 'Activer'}" th:class="${u.active ? 'button mini bg-orange fg-white' : 'button mini bg-green fg-white'}"> </button>
                        </form>
                        <form th:action="@{/deleteuser/{id}(id=${u.id})}" method="post" onsubmit="return confirm('Supprimer définitivement cet utilisateur ?')">
                            <input type="hidden" name="returnUrl" th:value="${listUrl}">
                            <button type="submit" class="button mini bg-red fg-white">Supprimer</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
        <div th:if="${#lists.isEmpty(users)}" class="alert alert-info mt-4">
            Aucun utilisateur trouvé.
        </div>
        <div th:if="${totalPages > 1}">
            <a th:if="${currentPage > 0}" th:href="@{__${listUrl}__(page=${currentPage - 1},search=${search})}" class="button">← Précédent</a>
            <span>Page <strong th:text="${currentPage + 1}"></strong> / <span th:text="${totalPages}"></span></span>
            <a th:if="${currentPage < totalPages - 1}" th:href="@{__${listUrl}__(page=${currentPage + 1},search=${search})}" class="button">Suivant →</a>
        </div>
    </main>
</body>
</html>
