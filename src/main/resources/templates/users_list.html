<!DOCTYPE html>
<html lang="fr" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Panel Admin - SR03</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.metroui.org.ua/current/metro.css">
    <link rel="stylesheet" href="https://cdn.metroui.org.ua/current/icons.css"/>
    <link rel="stylesheet" th:href="@{/stylesheets/styles.css}">
    <script src="https://cdn.metroui.org.ua/current/metro.js" defer></script>
</head>
<body>
    <nav data-role="appbar" data-expand-point="md" class="border border-size-1 bd-gray shadow-normal">
        <ul class="app-bar-menu">
            <li><a th:classappend="${!inactive ? ' active' : ''}" th:href="@{/listuser}"><span class="mif-home mr-1"></span> Accueil</a></li>
            <li><a th:href="@{/create}"><span class="mif-add-person mr-1"></span> Nouveau utilisateur</a></li>
            <li><a th:classappend="${inactive ? ' active' : ''}" th:href="@{/listinactiveuser}"><span class="mif-uninstall mr-1"></span> Utilisateurs désactivés</a></li>
        </ul>

        <div class="app-bar-item-static mx-auto mt-2">
            <h3 th:text="${sessionUser.firstname + ' ' + sessionUser.lastname}"></h3>
        </div>

        <div class="app-bar-item-static ml-auto">
            <a th:href="@{/logout}">
                <button class="small ml-1 alert">
                    <span class="mif-switch mr-1"></span> Déconnexion
                </button>
            </a>
        </div>
    </nav>

    <main class="container mt-8 mb-12">
        <h2 th:text="${inactive ? 'Utilisateurs désactivés' : 'Liste des utilisateurs'}">Liste des utilisateurs</h2>
        <form th:action="${listUrl}" class="row gap-1 my-4" method="get">
            <div class="cell-md-8">
                <input type="text" class="w-100" name="search" th:value="${search}" placeholder="Rechercher par nom, prénom ou email...">
            </div>
            <div class="cell-md-2">
                <button type="submit" class="button info bg-blue fg-white w-100">Rechercher</button>
            </div>
            <div class="cell-md-2">
                <a th:href="${listUrl}" class="button w-100">Réinitialiser</a>
            </div>
        </form>

        <div class="row mt-6">
            <table class="table striped border row-hover row-border" th:if="${not #lists.isEmpty(users)}">
                <thead>
                <tr>
                    <th>Nom</th>
                    <th>Prénom</th>
                    <th>Email</th>
                    <th>Rôle</th>
                    <th style="width: 220px;">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${users}">
                    <td th:text="${u.lastname}"></td>
                    <td th:text="${u.firstname}"></td>
                    <td th:text="${u.mail}"></td>
                    <td>
                        <span th:if="${u.admin}" class="badge inline bg-blue fg-white">Admin</span>
                        <span th:unless="${u.admin}" class="badge inline bg-gray fg-white">Utilisateur</span>
                    </td>
                    <td>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 4px;">
                            <a th:href="@{/edituser/{id}(id=${u.id})}" class="button small bg-dark fg-white">
                                <span class="mif-pencil mr-1"></span> Éditer
                            </a>
                            <form th:action="@{/toggleuser/{id}(id=${u.id})}" method="post" th:onsubmit="return confirm(${u.active ? 'Désactiver' : 'Activer'}+'ce compte utilisateur ?')" style="margin:0;"> <!-- TODO : fix this syntax-->
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="hidden" name="returnUrl" th:value="${listUrl}">
                                <button type="submit" th:class="${u.active ? 'button small bg-orange fg-white w-100' : 'button small bg-green fg-white w-100'}">
                                    <span th:class="${u.active ? 'mif-cancel mr-1' : 'mif-checkmark mr-1'}"></span>
                                    <span th:text="${u.active ? 'Désactiver' : 'Activer'}"></span>
                                </button>
                            </form>
                            <form th:action="@{/deleteuser/{id}(id=${u.id})}" method="post" onsubmit="return confirm('Supprimer définitivement cet utilisateur ?')" style="margin:0; grid-column: span 2;">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="hidden" name="returnUrl" th:value="${listUrl}">
                                <button type="submit" class="button small bg-red fg-white w-100">
                                    <span class="mif-bin mr-1"></span> Supprimer
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div th:if="${#lists.isEmpty(users)}" class="border border-size-1 border-radius-6 p-8 text-center text-muted mt-4">
            <span class="mif-users mif-4x d-block mb-4"></span>
            <p class="text-leader">Aucun utilisateur trouvé.</p>
        </div>

        <div th:if="${totalPages > 1}" class="d-flex flex-align-center flex-justify-center gap-4 mt-6">
            <a th:if="${currentPage > 0}" th:href="@{__${listUrl}__(page=${currentPage - 1},search=${search})}" class="button">← Précédent</a>
            <span>Page <strong th:text="${currentPage + 1}"></strong> / <span th:text="${totalPages}"></span></span>
            <a th:if="${currentPage < totalPages - 1}" th:href="@{__${listUrl}__(page=${currentPage + 1},search=${search})}" class="button">Suivant →</a>
        </div>
    </main>
</body>
</html>
